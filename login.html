<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | لوحة تحكم لينوزا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #050505;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: screen;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .login-card {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-field {
            background: #151515;
            border: 1px solid #222;
            color: white;
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 0.5rem;
            outline: none;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }
        .btn-login {
            background: #00ff88;
            color: black;
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            font-weight: 900;
            margin-top: 2rem;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        }
        .error-msg {
            color: #ff4d4d;
            font-size: 0.75rem;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-green-500 rounded-2xl flex items-center justify-center font-black text-black italic text-2xl mx-auto mb-4">L+</div>
            <h1 class="text-2xl font-black">تسجيل الدخول للنظام</h1>
            <p class="text-gray-500 text-sm mt-2">يرجى إدخال بيانات الاعتماد للوصول للوحة التحكم</p>
        </div>

        <form id="loginForm">
            <div>
                <label class="text-xs font-bold text-gray-400 px-1">البريد الإلكتروني</label>
                <input type="email" id="email" class="input-field" placeholder="example@gmail.com" required>
            </div>
            <div class="mt-4">
                <label class="text-xs font-bold text-gray-400 px-1">كلمة المرور</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>
            
            <div id="error" class="error-msg">❌ خطأ في البريد الإلكتروني أو كلمة المرور</div>

            <button type="submit" class="btn-login">دخول آمن</button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest leading-relaxed">Leanoza Plus Intelligence System<br>© 2026 Secured Access</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');

            // Secure validation (Local simulation)
            if (email === 'example@gmail.com' && password === 'admin123') {
                sessionStorage.setItem('l_auth', 'authenticated');
                window.location.href = 'dashboard.html';
            } else {
                error.style.display = 'block';
                setTimeout(() => { error.style.display = 'none'; }, 3000);
            }
        });

        // If already logged in, skip to dashboard
        if (sessionStorage.getItem('l_auth') === 'authenticated') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
